version: "3.8"

services:

  # API Gateway
  api-gateway:
    image: nginx:alpine
    container_name: ed-gateway
    ports:
      - "3000:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - org-auth-service
    networks:
      - ed-network
    restart: unless-stopped

  # Org & Auth Service
  org-auth-service:
    build:
      context: .
      dockerfile: ./org-auth-service/Dockerfile
    container_name: ed-org-auth
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 3001
      SERVICE_NAME: org-auth-service
      MONGO_URI: mongodb://mongo-org:27017/enterprisedesk_org
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://admin:password@rabbitmq:5672
      JWT_SECRET: enterprisedesk_jwt_secret_change_in_prod_32ch
      JWT_REFRESH_SECRET: enterprisedesk_refresh_secret_change_32ch
      JWT_EXPIRES_IN: 24h
    ports:
      - "3001:3001"
    volumes:
      - ./org-auth-service:/app/org-auth-service
      - /app/org-auth-service/node_modules
      - ./shared:/app/shared
      - /app/shared/utils/node_modules
    depends_on:
      mongo-org:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ed-network
    restart: unless-stopped

  #Employee Service
  employee-service:
    build: { context: ./employee-service, dockerfile: Dockerfile }
    container_name: ed-employee
      command: npm run dev
    environment:
      - NODE_ENV=development
      - PORT=3002
      - SERVICE_NAME=employee-service
      - MONGO_URI=mongodb://mongo-employee:27017/enterprisedesk_employees
      - RABBITMQ_URL=amqp://admin:password@rabbitmq:5672
      - JWT_SECRET=enterprisedesk_jwt_secret_change_in_prod_32ch
    depends_on:
      mongo-employee: { condition: service_healthy }
    networks: [ed-network]
    restart: unless-stopped

  # MongoDB
  mongo-org:
    image: mongo:6
    container_name: ed-mongo-org
    volumes:
      - mongo_org_data:/data/db
    networks:
      - ed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ed-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:4-management
    container_name: ed-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ed-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  ed-network:
    driver: bridge
    name: enterprise-desk-network

volumes:
  mongo_org_data:
    name: ed_mongo_org

  redis_data:
    name: ed_redis

  rabbitmq_data:
    name: ed_rabbitmq
    