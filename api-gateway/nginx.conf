events { worker_connections 1024; }

http {
  limit_req_zone $binary_remote_addr zone=api:10m    rate=100r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/m;

  upstream org_auth_service    { server org-auth-service:3001;    keepalive 32; }
  # upstream employee_service    { server employee-service:3002;    keepalive 32; }
  # upstream attendance_service  { server attendance-service:3003;  keepalive 32; }
  # upstream project_service     { server project-service:3004;     keepalive 32; }
  # upstream report_service      { server report-service:3005;      keepalive 32; }
  # upstream notification_service{ server notification-service:3006;keepalive 32; }

  server {
    listen 80;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS";
    add_header Access-Control-Allow-Headers "Authorization,Content-Type";

    if ($request_method = 'OPTIONS') { return 204; }

    # ── Org & Auth ────────────────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://org_auth_service/auth/;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/orgs/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://org_auth_service/orgs/;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Employees ─────────────────────────────────────────
    # location /api/employees/ {
    #   limit_req zone=api burst=20 nodelay;
    #   proxy_pass http://employee_service/employees/;
    #   proxy_set_header X-Real-IP $remote_addr;
    # }
    # location /api/departments/ {
    #   limit_req zone=api burst=20 nodelay;
    #   proxy_pass http://employee_service/departments/;
    #   proxy_set_header X-Real-IP $remote_addr;
    # }

    # ── Attendance ────────────────────────────────────────
    # location /api/attendance/ {
    #   limit_req zone=api burst=30 nodelay;
    #   proxy_pass http://attendance_service/attendance/;
    #   proxy_set_header X-Real-IP $remote_addr;
    # }
    # location /api/leaves/ {
    #   limit_req zone=api burst=20 nodelay;
    #   proxy_pass http://attendance_service/leaves/;
    #   proxy_set_header X-Real-IP $remote_addr;
    # }

    # ── Projects & Tasks ──────────────────────────────────
    # location /api/projects/ {
    #   limit_req zone=api burst=20 nodelay;
    #   proxy_pass http://project_service/projects/;
    #   proxy_set_header X-Real-IP $remote_addr;
    # }
    # location /api/tasks/ {
    #   limit_req zone=api burst=30 nodelay;
    #   proxy_pass http://project_service/tasks/;
    #   proxy_set_header X-Real-IP $remote_addr;
    # }

    # ── Reports ───────────────────────────────────────────
    # location /api/reports/ {
    #   limit_req zone=api burst=10 nodelay;
    #   proxy_pass http://report_service/reports/;
    #   proxy_set_header X-Real-IP $remote_addr;
    # }

    # ── Health ────────────────────────────────────────────
    location /health {
      return 200 '{"status":"healthy","gateway":"EnterpriseDesk API Gateway"}';
      add_header Content-Type application/json;
    }

    location / {
      return 404 '{"success":false,"message":"Route not found"}';
      add_header Content-Type application/json;
    }
  }
}
